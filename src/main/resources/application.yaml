spring:
  application:
    name: PathFinder

  datasource:
    url: jdbc:postgresql://localhost:5433/pathfinder_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true